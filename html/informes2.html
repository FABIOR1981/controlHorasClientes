<!-- informes2.html - Versión alternativa de informes para impresión -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informes 2</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/informes.css">
</head>
<body>
    <div class="informes-container">
        <img src="../imagenes/logo_shalon.png" alt="Logo Shalon Morales" style="display:block; margin:0 0 24px auto; max-width:180px; float:right;">
        <h2>Informes 2</h2>
        <form id="formInforme2">
            <label>Cliente:
                <select id="clienteInforme2">
                    <option value="todos">Todos</option>
                </select>
            </label>
            <label>Fecha inicio:
                <input type="date" id="fechaInicio2" required>
            </label>
            <label>Fecha fin:
                <input type="type" id="fechaFin2" required>
            </label>
            <button type="submit">Generar informe</button>
        </form>
        <div id="resultadoInforme2"></div>
        <button type="button" id="print-btn-2" onclick="window.print()">Imprimir informe</button>
    </div>
    <script src="../js/informes.js"></script>
<script>
const usuarioStr = localStorage.getItem('usuarioLogueado');
let usuario = null;
if(usuarioStr) {
    try {
        usuario = JSON.parse(usuarioStr);
    } catch {}
}
if(!usuario || !usuario.expiracion || Date.now() > usuario.expiracion) {
    localStorage.removeItem('usuarioLogueado');
    window.location.href = 'login.html';
}
</script>
</body>
</html>
